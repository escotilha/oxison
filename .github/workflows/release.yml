# Release workflow for oxison — publishes oxi-son to PyPI on a version tag.
#
# Mechanism: PyPI Trusted Publishing (OIDC). No API token is stored in the repo.
# The `id-token: write` permission lets the job mint a short-lived OIDC token
# that PyPI exchanges for a one-time upload credential at publish time.
#
# One-time PyPI setup (maintainer, before the first tag push):
#   PyPI → the oxi-son project → Settings → Publishing → add a Trusted Publisher:
#     Owner:        escotilha
#     Repository:   oxison
#     Workflow:     release.yml
#     Environment:  pypi
#   For the FIRST-EVER upload (project doesn't exist on PyPI yet), register a
#   "pending publisher" with the same four values at
#   https://pypi.org/manage/account/publishing/ — that authorises the initial
#   publish that creates the project.
#
# To cut a release: bump pyproject `version`, land it on main, then
#   git tag v0.6.0 && git push origin v0.6.0
#
# Security notes (mirrors ci.yml):
#   - Third-party actions pinned to full commit SHAs (OpenSSF guidance).
#   - GitHub-hosted runner is pinned explicitly (NOT the OXISON_RUNNER var):
#     Trusted Publishing's OIDC claims are issued for GitHub-hosted runners.
#   - permissions default to contents: read; only the publish step takes
#     id-token: write.

name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  publish:
    name: build + publish to PyPI
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: pypi
      url: https://pypi.org/p/oxi-son
    permissions:
      id-token: write   # OIDC token for PyPI Trusted Publishing
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
      - name: Validate metadata
        run: python -m twine check dist/*
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
