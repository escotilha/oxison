name: Auto-Merge Clean

# Squash-merges any open PR that is:
#   - state = OPEN
#   - not draft
#   - labeled "auto-merge" (opt-in safety: nothing merges unless explicitly tagged)
#   - mergeable == MERGEABLE (no conflicts)
#   - every status check EXCEPT this workflow's own ("Squash-merge CLEAN PRs")
#     has concluded SUCCESS / NEUTRAL / SKIPPED, and at least one such check exists
#
# Why the per-check gate instead of mergeStateStatus == CLEAN:
# oxison has no required-status-check protection, so when the `auto-merge` label is
# applied the resulting pull_request_target run attaches its OWN pending check
# ("Squash-merge CLEAN PRs") to the PR — which flips mergeStateStatus to UNSTABLE
# while this very job polls. A CLEAN-only gate therefore can never see itself green
# and self-defeats, leaving the merge to the cron backstop (the observed delay on
# PR #40). Evaluating the check rollup while EXCLUDING this workflow's own check
# sidesteps that race: a PR whose only non-green check is us is treated as ready.
# Requiring >=1 non-self check avoids merging in the brief window before CI registers.
#
# Triggers:
#   - workflow_run on the gating CI workflows' completion (reliable signal; these
#     runs do NOT attach a check to the PR, so they never self-block).
#   - check_suite.completed (catches suites — e.g. CodeQL — not named in
#     workflow_run; GitHub suppresses it on re-runs, so it is a backup not the only
#     path).
#   - pull_request_target.labeled (label an already-green PR -> merge now; the
#     per-check gate above is what lets this path work despite its own pending check).
#   - schedule (cron backstop for anything the events miss).
#   - workflow_dispatch (manual nudge from the Actions tab).
#
# Security note (pull_request_target): this trigger runs in the BASE-repo context
# with secrets. This workflow deliberately checks out NO ref at all — it only
# calls `gh pr merge` via GITHUB_TOKEN — so the pull_request_target pwn-request
# attack surface does not apply. If you ever add actions/checkout here, you MUST
# pin to the base sha and treat all PR content as untrusted.

on:
  workflow_run:
    # Must match each workflow's top-level `name:` exactly.
    workflows: ["ci", "claude-review"]
    types: [completed]
  check_suite:
    types: [completed]
  pull_request_target:
    types: [labeled]
  schedule:
    - cron: "7,37 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: auto-merge-clean
  cancel-in-progress: false

jobs:
  merge:
    name: Squash-merge CLEAN PRs
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Skip noise: only sweep after a SUCCESSFUL ci/check run, or when the applied
    # label is "auto-merge"; schedule and manual dispatch always run.
    if: >-
      (github.event_name == 'check_suite' && github.event.check_suite.conclusion == 'success') ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      (github.event_name == 'pull_request_target' && github.event.label.name == 'auto-merge') ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch'
    steps:
      - name: Find and squash-merge ready PRs labeled auto-merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # Fast exit if nothing is labeled — most ci/check fires are for PRs with
          # no auto-merge label, and we don't want to poll (below) for them.
          LABELED=$(gh pr list --repo "$REPO" --state open --label auto-merge \
            --json number --jq 'length')
          if [ "$LABELED" -eq 0 ]; then
            echo "No auto-merge-labeled PRs open."
            exit 0
          fi

          # "Ready" = not draft, no conflicts, and every check OTHER THAN this
          # workflow's own has concluded green (with >=1 such check present). See
          # the header for why we exclude our own check instead of using
          # mergeStateStatus == CLEAN. Poll up to ~90s for checks / mergeability to
          # settle after the triggering event (GitHub recomputes asynchronously).
          READY_JQ='[ .[]
            | select(.isDraft == false and .mergeable == "MERGEABLE")
            | . as $pr
            | ([ $pr.statusCheckRollup[]?
                 | select((.name // .context) != "Squash-merge CLEAN PRs") ]) as $checks
            | select(($checks | length) > 0)
            | select($checks | all((.conclusion // .state) as $c
                | ($c == "SUCCESS" or $c == "NEUTRAL" or $c == "SKIPPED")))
            | .number ]'

          PRS='[]'
          for attempt in 1 2 3 4 5 6; do
            PRS=$(gh pr list \
              --repo "$REPO" \
              --state open \
              --label auto-merge \
              --json number,mergeable,isDraft,statusCheckRollup \
              --jq "$READY_JQ")
            COUNT=$(echo "$PRS" | jq 'length')
            [ "$COUNT" -gt 0 ] && break
            echo "attempt $attempt/6: no ready PRs yet (checks/mergeability settling) — wait 15s"
            sleep 15
          done

          COUNT=$(echo "$PRS" | jq 'length')
          if [ "$COUNT" -eq 0 ]; then
            echo "No ready auto-merge PRs to process after polling."
            exit 0
          fi

          echo "$COUNT PR(s) to merge: $(echo "$PRS" | jq -c .)"
          echo "$PRS" | jq -r '.[]' | while read -r N; do
            echo ""
            echo "=== Merging PR #$N ==="
            if gh pr merge "$N" --repo "$REPO" --squash --delete-branch; then
              echo "✓ #$N merged"
            else
              echo "✗ #$N merge failed — leaving for next run"
            fi
            sleep 5  # small delay to avoid rate-limit between merges
          done
